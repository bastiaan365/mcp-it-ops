name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Show installed versions
        run: pip list | grep -iE '^(mcp|httpx|pyyaml|pytest|respx)\b' || true

      - name: Run pytest with JUnit output
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results-${{ matrix.python-version }}.xml

      - name: Sanity-load the server (proves all tools register)
        run: |
          python -c "from mcp_it_ops.server import mcp; import asyncio; tools = asyncio.run(mcp.list_tools()); print(f'Registered {len(tools)} tools'); assert len(tools) >= 3, 'expected >= 3 tools'"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: test-results-${{ matrix.python-version }}.xml
          if-no-files-found: warn
